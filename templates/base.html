<!DOCTYPE html>
<html>
<head>
    <title>Outreach Email Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f8f9fa; color: #333; }
        .navbar { background: #002b49; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eeeeee; }
        th { background-color: #f1f3f5; font-weight: 600; color: #495057; }
        tr:hover { background-color: #f8f9fa; cursor: pointer; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge-sent { background: #d4edda; color: #155724; }
        .badge-failed { background: #f8d7da; color: #721c24; }
        .view-btn { text-decoration: none; color: #0056b3; font-weight: bold; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        .meta-label { font-weight: bold; color: #6c757d; display: inline-block; width: 120px; }
        .preview-box { border: 1px solid #dee2e6; border-radius: 6px; padding: 20px; margin-top: 25px; background: #fff; }
    </style>
</head>
<body>
    <div class="navbar">✈️ IITK Cold Outreach CRM Dashboard</div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
